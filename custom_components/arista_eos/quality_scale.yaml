rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration is read-only and registers no actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency:
    status: done
    comment: No external runtime dependencies; the eAPI client is vendored.
  docs-actions:
    status: exempt
    comment: No actions are provided.
  docs-conditions:
    status: exempt
    comment: No conditions are provided.
  docs-triggers:
    status: exempt
    comment: No triggers are provided.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No actions are provided.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info: done
  discovery: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: >-
      Each config entry represents exactly one switch (one device). There are no
      runtime-discovered child devices; per-unit hardware is modeled as entities.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: done
    comment: >-
      Redundant per-unit problem flags are disabled by default; high-cardinality
      interface/transceiver entities are created only when their option is enabled.
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices: done

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
